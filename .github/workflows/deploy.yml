name: Deploy Cloudflare Worker API (Production)

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

  workflow_dispatch: {}

concurrency:
  group: cloudflare-worker-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS 22)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Generate Worker types
        run: npm run cf-typegen

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Show deployments (safe)
        run: npx wrangler deployments list || echo "No deployments yet"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deployment success notice
        run: echo "🚀 Worker deployed successfully"