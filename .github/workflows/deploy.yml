name: Deploy Cloudflare Worker API (Production)

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch: {}

concurrency:
  group: cloudflare-worker-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show branch + commit (debug)
        run: |
          echo "Branch: $GITHUB_REF"
          echo "Commit: $GITHUB_SHA"

      - name: Setup Node.js (LTS 22)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify Node + npm versions
        run: |
          node -v
          npm -v

      - name: Install dependencies (clean install)
        run: npm ci

      - name: Run TypeScript type check
        run: npm run check

      - name: Generate Worker types
        run: npm run cf-typegen

      - name: Install Wrangler explicitly
        run: npm install -g wrangler

      - name: Verify Wrangler authentication
        run: npx wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Workers (production)
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Show deployments list
        run: npx wrangler deployments list
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify Worker routes
        run: npx wrangler route list
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deployment success notice
        run: echo "🚀 Worker deployed successfully to production"