jobs:
  deploy:
    name: Build & Deploy Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS 22)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify Node + npm versions
        run: |
          node -v
          npm -v

      - name: Install dependencies (clean install)
        run: npm ci

      - name: Run TypeScript type check
        run: npm run check

      - name: Generate Worker types
        run: npm run cf-typegen

      - name: Install Wrangler explicitly
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Workers (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production

      - name: Show deployment info
        run: npx wrangler deployments list

      - name: Verify Worker route
        run: npx wrangler route list

      - name: Deployment success notice
        run: echo "🚀 Worker deployed successfully to production"