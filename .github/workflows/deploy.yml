name: Deploy Cloudflare Worker API (Production)

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cloudflare-worker-production
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Build & Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS 22)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build -w apps/site

      - name: Verify site dist exists
        run: test -d apps/site/dist

      - name: Generate Cloudflare types
        run: npx wrangler types -c apps/api/wrangler.jsonc

      - name: Type check
        run: npm run check -w apps/api

      - name: Validate Wrangler auth
        run: npx wrangler whoami -c apps/api/wrangler.jsonc
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: npx wrangler deploy --minify --keep-vars -c apps/api/wrangler.jsonc
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Done
        run: echo "🚀 Deployment complete"
