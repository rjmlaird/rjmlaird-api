<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="description" content="rjmlaird API"/>
  <title>rjmlaird API</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui.css" crossorigin="anonymous">
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(11, 23, 48, 0.78);
      --panel-2: rgba(15, 31, 61, 0.82);
      --border: #1f335d;
      --border-soft: #273d6c;
      --text: #e5eefc;
      --muted: #9ab0d1;
      --accent: #7dd3fc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(96,165,250,0.14), transparent 30%),
        linear-gradient(180deg, #06101d 0%, #07111f 100%);
      color: var(--text);
    }

    .shell {
      max-width: 1360px;
      margin: 0 auto;
      padding: 28px 20px 44px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-end;
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.9rem;
      letter-spacing: -0.03em;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 66ch;
      line-height: 1.5;
    }

    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .docs-card {
      border: 1px solid var(--border-soft);
      background: var(--panel);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.30);
      backdrop-filter: blur(10px);
    }

    .docs-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 31, 61, 0.58);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .docs-head strong {
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .docs-head a {
      color: var(--accent);
      text-decoration: none;
    }

    .docs-head a:hover {
      text-decoration: underline;
    }

    #swagger-ui {
      background: #fff;
      min-height: 72vh;
    }

    .swagger-ui .topbar {
      display: none;
    }

    .swagger-ui .info {
      margin: 0;
      padding: 18px 18px 0;
    }

    .swagger-ui .info .title {
      font-size: 2rem;
    }

    .swagger-ui .info .title small {
      display: none;
    }

    .swagger-ui .scheme-container {
      background: #f8fbff;
      border-bottom: 1px solid #e4ecf7;
      box-shadow: none;
      padding: 14px 18px;
    }

    .swagger-ui .opblock {
      border-radius: 12px;
      margin: 0 0 12px;
      box-shadow: none;
    }

    .swagger-ui .opblock.opblock-get {
      border-color: #bfe8ff;
    }

    .swagger-ui .opblock.opblock-post {
      border-color: #c7f0d8;
    }

    .swagger-ui .opblock-summary {
      padding: 10px 14px;
    }

    .swagger-ui .btn {
      border-radius: 10px;
    }

    .swagger-ui .markdown p,
    .swagger-ui .opblock-summary-description {
      color: #42526e;
    }

    @media (max-width: 720px) {
      .hero {
        flex-direction: column;
        align-items: flex-start;
      }

      .meta {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div class="brand">
        <h1>rjmlaird API</h1>
        <p>GitHub-powered CV + research + WebDAV API, documented live through Swagger UI.</p>
      </div>
      <div class="meta">
        <div class="chip">Cloudflare Workers</div>
        <div class="chip">OpenAPI 3.1</div>
        <div class="chip">Live docs</div>
      </div>
    </div>

    <div class="docs-card">
      <div class="docs-head">
        <strong>API Reference</strong>
        <a href="/openapi.json" target="_blank" rel="noreferrer">Open raw spec</a>
      </div>
      <div id="swagger-ui"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui-bundle.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui-standalone-preset.js" crossorigin="anonymous"></script>
  <script>
    window.onload = () => {
      window.ui = SwaggerUIBundle({
        url: '/openapi.json',
        dom_id: '#swagger-ui',
        deepLinking: true,
        layout: 'BaseLayout',
        docExpansion: 'list',
        filter: true,
        displayRequestDuration: true,
        presets: [SwaggerUIBundle.presets.apis],
      });
    };
  </script>
</body>
</html>
