<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="description" content="rjmlaird API"/>
  <title>rjmlaird API</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui.css" crossorigin="anonymous">
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(11, 23, 48, 0.78);
      --panel-2: rgba(15, 31, 61, 0.82);
      --panel-3: rgba(7, 17, 31, 0.92);
      --border: #1f335d;
      --border-soft: #273d6c;
      --text: #f8fafc;
      --text-2: #dbe7f5;
      --muted: #cbd5e1;
      --accent: #7dd3fc;
      --accent-2: #60a5fa;
      --accent-3: #22c55e;
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(96,165,250,0.14), transparent 30%),
        radial-gradient(circle at 80% 0%, rgba(34,197,94,0.08), transparent 18%),
        linear-gradient(180deg, #06101d 0%, #07111f 100%);
      color: var(--text);
    }

    a { color: var(--accent); }

    .shell {
      max-width: 1360px;
      margin: 0 auto;
      padding: 28px 20px 44px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-end;
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.95rem;
      line-height: 1.05;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--text-2);
      max-width: 66ch;
      line-height: 1.5;
    }

    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .docs-card {
      border: 1px solid var(--border-soft);
      background: var(--panel);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.30);
      backdrop-filter: blur(10px);
    }

    .docs-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 31, 61, 0.58);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .docs-head strong {
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .docs-head a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .docs-head a:hover {
      text-decoration: underline;
    }

    #swagger-ui {
      background: var(--panel-3);
      min-height: 72vh;
    }

    .swagger-ui {
      background: transparent !important;
      color: var(--text) !important;
    }

    .swagger-ui * {
      color: inherit;
    }

    .swagger-ui .topbar {
      display: none !important;
    }

    .swagger-ui .info {
      margin: 0;
      padding: 18px 18px 0;
      background: transparent !important;
    }

    .swagger-ui .info .title {
      color: var(--text);
      font-size: 2rem;
      margin-bottom: 6px;
    }

    .swagger-ui .info .title small {
      display: none;
    }

    .swagger-ui .info p,
    .swagger-ui .markdown p,
    .swagger-ui .opblock-summary-description,
    .swagger-ui .parameter__type,
    .swagger-ui .parameter__name,
    .swagger-ui .response-col_description,
    .swagger-ui .response-col_status,
    .swagger-ui .tab li,
    .swagger-ui .tab button,
    .swagger-ui label,
    .swagger-ui .model-title,
    .swagger-ui .model,
    .swagger-ui .renderedMarkdown {
      color: var(--muted) !important;
    }

    .swagger-ui .scheme-container {
      background: rgba(11, 23, 48, 0.95) !important;
      border-bottom: 1px solid var(--border) !important;
      box-shadow: none !important;
      padding: 14px 18px;
    }

    .swagger-ui .auth-wrapper,
    .swagger-ui .btn.authorize,
    .swagger-ui .btn {
      border-radius: 10px !important;
    }

    .swagger-ui .btn {
      background: rgba(15, 31, 61, 0.85) !important;
      border-color: var(--border-soft) !important;
      color: var(--text) !important;
    }

    .swagger-ui .btn span {
      color: var(--text) !important;
    }

    .swagger-ui .opblock {
      border-radius: 12px !important;
      margin: 0 0 12px !important;
      box-shadow: none !important;
      background: rgba(11, 23, 48, 0.96) !important;
      border: 1px solid var(--border-soft) !important;
    }

    .swagger-ui .opblock .opblock-summary {
      padding: 10px 14px;
    }

    .swagger-ui .opblock.opblock-get {
      border-color: rgba(125, 211, 252, 0.45) !important;
    }

    .swagger-ui .opblock.opblock-post {
      border-color: rgba(34, 197, 94, 0.42) !important;
    }

    .swagger-ui .opblock.opblock-put {
      border-color: rgba(96, 165, 250, 0.42) !important;
    }

    .swagger-ui .opblock.opblock-delete {
      border-color: rgba(248, 113, 113, 0.42) !important;
    }

    .swagger-ui .opblock .opblock-section-header,
    .swagger-ui .opblock .opblock-description-wrapper,
    .swagger-ui .opblock .parameters,
    .swagger-ui .opblock .responses-wrapper,
    .swagger-ui .opblock .responses-inner {
      background: transparent !important;
    }

    .swagger-ui table thead tr th,
    .swagger-ui table tbody tr td {
      background: transparent !important;
      color: var(--text) !important;
      border-color: rgba(255,255,255,0.08) !important;
    }

    .swagger-ui .model-box,
    .swagger-ui .model,
    .swagger-ui .models,
    .swagger-ui .renderedMarkdown {
      background: transparent !important;
      color: var(--text) !important;
    }

    .swagger-ui .responses-inner h4,
    .swagger-ui .responses-inner h5,
    .swagger-ui .opblock-title,
    .swagger-ui .opblock-section-header h4 {
      color: var(--text) !important;
    }

    .swagger-ui .opblock-summary-method {
      border-radius: 999px !important;
      font-weight: 700 !important;
      letter-spacing: 0.02em;
    }

    .swagger-ui .btn.execute {
      background: linear-gradient(180deg, #0ea5e9, #2563eb) !important;
      border: none !important;
      color: white !important;
    }

    .swagger-ui .btn.try-out__btn {
      background: rgba(15, 31, 61, 0.9) !important;
    }

    .swagger-ui input,
    .swagger-ui select,
    .swagger-ui textarea {
      background: rgba(7, 17, 31, 0.95) !important;
      color: var(--text) !important;
      border-color: var(--border-soft) !important;
    }

    .swagger-ui .copy-to-clipboard,
    .swagger-ui .download-url-wrapper {
      color: var(--accent) !important;
    }

    .swagger-ui .info .title span,
    .swagger-ui .info .title small,
    .swagger-ui .scheme-container .schemes-title {
      color: var(--text) !important;
    }

    @media (max-width: 720px) {
      .hero {
        flex-direction: column;
        align-items: flex-start;
      }

      .meta {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div class="brand">
        <h1>rjmlaird API</h1>
        <p>GitHub-powered CV + research + WebDAV API, documented live through Swagger UI.</p>
      </div>
      <div class="meta">
        <div class="chip">Cloudflare Workers</div>
        <div class="chip">OpenAPI 3.1</div>
        <div class="chip">Live docs</div>
      </div>
    </div>

    <div class="docs-card">
      <div class="docs-head">
        <strong>API Reference</strong>
        <a href="/openapi.json" target="_blank" rel="noreferrer">Open raw spec</a>
      </div>
      <div id="swagger-ui"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui-bundle.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui-standalone-preset.js" crossorigin="anonymous"></script>
  <script>
    window.onload = () => {
      window.ui = SwaggerUIBundle({
        url: '/openapi.json',
        dom_id: '#swagger-ui',
        deepLinking: true,
        layout: 'BaseLayout',
        docExpansion: 'list',
        filter: true,
        displayRequestDuration: true,
        presets: [SwaggerUIBundle.presets.apis]
      });
    };
  </script>
</body>
</html>
