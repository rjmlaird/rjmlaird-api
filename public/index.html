<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="description" content="rjmlaird API"/>
  <title>rjmlaird API</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui.css" crossorigin="anonymous">
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    .wrap {
      max-width: 960px;
      margin: auto;
      padding: 48px 20px;
    }

    h1 {
      margin-bottom: 6px;
      color: #f8fafc;
    }

    p {
      color: #9ca3af;
      margin-top: 0;
      line-height: 1.5;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.22);
    }

    .card strong {
      color: #f8fafc;
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }

    .endpoint {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      font-family: monospace;
      border-bottom: 1px solid #1f2937;
      color: #e5e7eb;
      gap: 12px;
    }

    .endpoint:last-child {
      border-bottom: none;
    }

    .method {
      color: #38bdf8;
      font-weight: 700;
      margin-right: 8px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      flex: 0 0 auto;
    }

    .path {
      color: #f8fafc;
      overflow-wrap: anywhere;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    #swagger-ui {
      margin-top: 18px;
      background: #0f172a;
      border: 1px solid #1f2937;
      border-radius: 12px;
      overflow: hidden;
    }

    .swagger-ui {
      background: transparent !important;
      color: #f8fafc !important;
    }

    .swagger-ui .topbar {
      display: none !important;
    }

    .swagger-ui .info {
      margin: 0;
      padding: 18px 18px 0;
    }

    .swagger-ui .info .title {
      color: #f8fafc !important;
    }

    .swagger-ui .info p,
    .swagger-ui .markdown p,
    .swagger-ui .opblock-summary-description,
    .swagger-ui .parameter__type,
    .swagger-ui .parameter__name,
    .swagger-ui .response-col_description,
    .swagger-ui .response-col_status,
    .swagger-ui .tab li,
    .swagger-ui .tab button,
    .swagger-ui label,
    .swagger-ui .model-title,
    .swagger-ui .model,
    .swagger-ui .renderedMarkdown {
      color: #cbd5e1 !important;
    }

    .swagger-ui .scheme-container {
      background: #111827 !important;
      border-bottom: 1px solid #1f2937 !important;
      box-shadow: none !important;
      padding: 14px 18px;
    }

    .swagger-ui .opblock {
      border-radius: 12px !important;
      margin: 0 0 12px !important;
      box-shadow: none !important;
      background: #111827 !important;
      border: 1px solid #374151 !important;
    }

    .swagger-ui .opblock .opblock-summary {
      padding: 12px 14px;
      background: #111827 !important;
    }

    .swagger-ui .opblock-summary {
      color: #f8fafc !important;
    }

    .swagger-ui .opblock-summary-method {
      color: #ffffff !important;
      background: linear-gradient(180deg, #0ea5e9, #2563eb) !important;
      border: none !important;
      border-radius: 999px !important;
      font-weight: 700 !important;
      letter-spacing: 0.02em;
      min-width: 56px;
      text-align: center;
    }

    .swagger-ui .opblock-summary-path {
      color: #f8fafc !important;
      font-weight: 700 !important;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
      overflow-wrap: anywhere;
    }

    .swagger-ui .opblock-summary-description {
      color: #cbd5e1 !important;
    }

    .swagger-ui .opblock.opblock-get {
      border-color: rgba(56, 189, 248, 0.45) !important;
    }

    .swagger-ui .opblock.opblock-post {
      border-color: rgba(34, 197, 94, 0.42) !important;
    }

    .swagger-ui .opblock.opblock-put {
      border-color: rgba(96, 165, 250, 0.42) !important;
    }

    .swagger-ui .opblock.opblock-delete {
      border-color: rgba(248, 113, 113, 0.42) !important;
    }

    .swagger-ui .opblock .opblock-section-header,
    .swagger-ui .opblock .opblock-description-wrapper,
    .swagger-ui .opblock .parameters,
    .swagger-ui .opblock .responses-wrapper,
    .swagger-ui .opblock .responses-inner {
      background: transparent !important;
    }

    .swagger-ui .opblock-section-header {
      background: #111827 !important;
      border-bottom: 1px solid #374151 !important;
    }

    .swagger-ui .opblock-section-header h4,
    .swagger-ui .opblock-section-header label {
      color: #f8fafc !important;
      font-weight: 700 !important;
    }

    .swagger-ui .parameters,
    .swagger-ui .responses-wrapper,
    .swagger-ui .responses-inner,
    .swagger-ui .opblock-body {
      color: #e5e7eb !important;
    }

    .swagger-ui .parameters-col_description,
    .swagger-ui .parameters-col_name,
    .swagger-ui .parameter__name,
    .swagger-ui .parameter__type,
    .swagger-ui .param-name,
    .swagger-ui .tab,
    .swagger-ui .response-col_status,
    .swagger-ui .response-col_description,
    .swagger-ui .responses-inner h4,
    .swagger-ui .responses-inner h5,
    .swagger-ui .opblock-title {
      color: #cbd5e1 !important;
    }

    .swagger-ui .btn {
      border-radius: 10px !important;
      background: #1f2937 !important;
      border-color: #374151 !important;
      color: #f8fafc !important;
    }

    .swagger-ui .btn.execute {
      background: linear-gradient(180deg, #0ea5e9, #2563eb) !important;
      border: none !important;
      color: #ffffff !important;
    }

    .swagger-ui .btn.try-out__btn {
      background: #1f2937 !important;
      border-color: #374151 !important;
      color: #f8fafc !important;
    }

    .swagger-ui .try-out,
    .swagger-ui .try-out__btn {
      color: #f8fafc !important;
    }

    .swagger-ui .try-out__btn:hover {
      background: #374151 !important;
    }

    .swagger-ui input,
    .swagger-ui select,
    .swagger-ui textarea {
      background: #0b1220 !important;
      color: #f8fafc !important;
      border-color: #374151 !important;
    }

    .swagger-ui .copy-to-clipboard,
    .swagger-ui .download-url-wrapper {
      color: #38bdf8 !important;
    }

    .swagger-ui a {
      color: #38bdf8 !important;
    }

    .swagger-ui code,
    .swagger-ui pre,
    .swagger-ui .microlight {
      color: #f8fafc !important;
      background: rgba(17, 24, 39, 0.92) !important;
    }

    @media (max-width: 720px) {
      .wrap {
        padding: 28px 16px;
      }

      .endpoint {
        flex-direction: column;
        align-items: flex-start;
      }

      .method {
        margin-right: 0;
        margin-bottom: 4px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div id="swagger-ui"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui-bundle.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui-standalone-preset.js" crossorigin="anonymous"></script>
  <script>
    window.onload = () => {
      window.ui = SwaggerUIBundle({
        url: '/openapi.json',
        dom_id: '#swagger-ui',
        deepLinking: true,
        layout: 'BaseLayout',
        docExpansion: 'list',
        filter: true,
        displayRequestDuration: true,
        presets: [SwaggerUIBundle.presets.apis]
      });
    };
  </script>
</body>
</html>
